<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Login | Spatial.360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: var(--bg-primary); padding: 60px 20px;">
    <!-- Top Right Controls -->
    <div class="position-fixed top-0 end-0 p-4 d-flex gap-3" style="z-index: 1000;">
        <button class="theme-toggle" aria-label="Toggle Dark Mode"><i class="bi bi-moon-stars"></i></button>
        <button class="rtl-toggle" aria-label="Toggle RTL"><i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div class="spatial-card no-hover auth-simple" style="width: 100%; max-width: 420px; z-index: 2;">
        <div class="text-center mb-4">
            <a href="index.html" class="d-flex align-items-center justify-content-center gap-2 mb-3 text-decoration-none">
                <div class="logo-icon"><i class="bi bi-box"></i></div>
                <span class="brand-name">SPATIAL.360</span>
            </a>
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted small">Access your spatial dashboard</p>
        </div>

        <form action="dashboard.html">
            <div class="mb-3">
                <label class="form-label small text-muted">Email Address</label>
                <input type="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-control pe-5" id="loginPassword" placeholder="••••••••" required>
                    <i class="bi bi-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="small text-grad-purple fw-medium">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-premium w-100 py-3 mb-4">Login to Account</button>

            <div class="social-login-separator mb-4">
                <span>Or continue with</span>
            </div>

            <div class="d-flex gap-3 mb-4">
                <button type="button" class="btn-social w-100">
                    <i class="bi bi-google me-2"></i> Google
                </button>
                <button type="button" class="btn-social w-100">
                    <i class="bi bi-apple me-2"></i> Apple
                </button>
            </div>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-muted">Don't have an account? <a href="register.html" class="text-grad-purple fw-bold">Create account</a></p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
